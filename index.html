<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Home Dashboard</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,Arial;
background:#1b1b1b;
color:#e6e6e6;
}

/* particle background */

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* dashboard */

.app{

width:95%;
max-width:1000px;
height:92vh;

margin:auto;
margin-top:4vh;

background:#262626;

border-radius:20px;

display:flex;
flex-direction:column;

padding:20px;

box-shadow:0 0 40px rgba(0,0,0,0.5);

}

/* header */

.header{

display:flex;
justify-content:space-between;
align-items:center;

font-size:22px;

}

/* nav */

.nav{
display:flex;
gap:10px;
margin:10px 0;
}

/* buttons */

button{

padding:10px 16px;

border:none;

border-radius:12px;

background:linear-gradient(135deg,#444,#333);

color:white;

cursor:pointer;

transition:.25s;

}

button:hover{

transform:scale(1.05);

background:linear-gradient(135deg,#666,#444);

}

/* panels */

.panel{
flex:1;
display:none;
overflow:auto;
}

.panel.active{
display:block;
}

/* chat */

.chat{

height:360px;

overflow:auto;

background:#1c1c1c;

border-radius:12px;

padding:10px;

display:flex;
flex-direction:column;

}

/* messages */

.msg{

padding:10px;

margin:6px 0;

border-radius:12px;

max-width:75%;

}

.user{
background:#4b6cff;
margin-left:auto;
}

.ai{
background:#3a3a3a;
}

/* inputs */

input,textarea{

width:100%;

padding:12px;

border:none;

border-radius:12px;

background:#333;

color:white;

}

/* input area */

.inputArea{
display:flex;
gap:10px;
margin-top:10px;
}

/* account */

.accountBox{
max-width:400px;
margin:auto;
}

</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="app">

<div class="header">

Home Dashboard

</div>

<div class="nav">

<button onclick="showPanel('ai')">AI</button>
<button onclick="showPanel('notes')">Notes</button>
<button onclick="showPanel('runner')">Code</button>
<button onclick="showPanel('files')">Files</button>
<button onclick="showPanel('account')">Account</button>
<button onclick="showPanel('settings')">Settings</button>

</div>

<!-- AI -->

<div class="panel active" id="ai">

<div class="chat" id="chat"></div>

<div class="inputArea">

<input id="aiInput" placeholder="Message AI...">

<button onclick="send()">Send</button>

</div>

</div>

<!-- NOTES -->

<div class="panel" id="notes">

<h3>Notes</h3>

<textarea id="notesBox"></textarea>

<button onclick="saveNotes()">Save</button>

</div>

<!-- CODE -->

<div class="panel" id="runner">

<h3>Code Runner</h3>

<textarea id="code">print(2)</textarea>

<button onclick="runCode()">Run</button>

<div id="output"></div>

</div>

<!-- FILES -->

<div class="panel" id="files">

<h3>Upload Files</h3>

<input type="file" id="fileInput">

<div id="fileList"></div>

</div>

<!-- ACCOUNT -->

<div class="panel" id="account">

<div class="accountBox">

<h3>Login</h3>

<input id="loginUser" placeholder="Username">
<input id="loginPass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<h3>Create Account</h3>

<input id="signUser" placeholder="Username">
<input id="signPass" type="password" placeholder="Password">

<button onclick="signup()">Sign Up</button>

</div>

</div>

<!-- SETTINGS -->

<div class="panel" id="settings">

<h3>Settings</h3>

<button onclick="toggleTheme()">Toggle Theme</button>

<button onclick="clearChat()">Clear Chat</button>

</div>

</div>

<script>

let username=""

/* panels */

function showPanel(id){

document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"))

document.getElementById(id).classList.add("active")

}

/* chat */

function addMessage(text,type){

let msg=document.createElement("div")

msg.className="msg "+type

msg.innerText=text

chat.appendChild(msg)

chat.scrollTop=chat.scrollHeight

}

/* send */

async function send(){

let text=aiInput.value

if(!text) return

addMessage(text,"user")

aiInput.value=""

let res=await fetch("/ai",{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({
username:username,
message:text
})

})

let data=await res.json()

addMessage(data.reply,"ai")

}

/* login */

async function login(){

let u=loginUser.value
let p=loginPass.value

let res=await fetch("/login",{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({username:u,password:p})

})

let data=await res.json()

if(data.error) alert(data.error)
else{

username=u

alert("Logged in")

}

}

/* signup */

async function signup(){

let u=signUser.value
let p=signPass.value

let res=await fetch("/signup",{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({username:u,password:p})

})

let data=await res.json()

if(data.error) alert(data.error)
else alert("Account created")

}

/* notes */

notesBox.value=localStorage.getItem("notes")||""

function saveNotes(){

localStorage.setItem("notes",notesBox.value)

}

/* code runner */

function runCode(){

let code=document.getElementById("code").value

let match=code.match(/print\((.*?)\)/)

if(match){

output.innerText=match[1]

}else{

try{output.innerText=eval(code)}
catch(e){output.innerText=e}

}

}

/* settings */

function toggleTheme(){
document.body.classList.toggle("light")
}

function clearChat(){
chat.innerHTML=""
}

/* particles */

const canvas=document.getElementById("particles")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let particles=[]

for(let i=0;i<80;i++){

particles.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2+1,
dx:Math.random()-0.5,
dy:Math.random()-0.5

})

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

particles.forEach(p=>{

ctx.beginPath()
ctx.arc(p.x,p.y,p.r,0,Math.PI*2)
ctx.fillStyle="#555"
ctx.fill()

p.x+=p.dx
p.y+=p.dy

})

requestAnimationFrame(animate)

}

animate()

</script>

</body>
</html>
