<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Future AI Dashboard</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#0b0b0b;
color:white;
transition:0.3s;
}

/* light mode */

body.light{
background:#f2f2f2;
color:#111;
}

/* center device */

.device{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:900px;
height:600px;
background:rgba(20,20,20,0.9);
border-radius:25px;
box-shadow:0 0 60px rgba(0,255,255,0.25);
padding:25px;
display:flex;
flex-direction:column;
}

body.light .device{
background:white;
}

/* header */

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.title{
font-size:28px;
font-weight:bold;
}

/* buttons */

button{
padding:10px 18px;
border:none;
border-radius:10px;
background:#00aaff;
color:white;
cursor:pointer;
transition:0.2s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 15px #00aaff;
}

/* nav */

.nav{
display:flex;
gap:10px;
margin-bottom:15px;
}

/* panels */

.panel{
flex:1;
background:rgba(0,0,0,0.5);
border-radius:15px;
padding:15px;
overflow:auto;
display:none;
}

.panel.active{
display:block;
}

body.light .panel{
background:#eeeeee;
}

/* AI chat */

.chat{
height:350px;
overflow:auto;
margin-bottom:10px;
}

.msg{
margin:5px 0;
padding:8px 12px;
border-radius:10px;
max-width:70%;
}

.user{
background:#0077ff;
align-self:flex-end;
}

.ai{
background:#444;
}

body.light .ai{
background:#ddd;
}

/* inputs */

input,textarea{
width:100%;
padding:10px;
border-radius:10px;
border:none;
margin-top:5px;
}

/* settings */

.setting{
margin-bottom:10px;
}

</style>
</head>

<body>

<div class="device">

<div class="header">
<div class="title">Future AI Dashboard</div>
<button onclick="toggleTheme()">🌙 / ☀️</button>
</div>

<div class="nav">
<button onclick="showPanel('ai')">AI</button>
<button onclick="showPanel('notes')">Notes</button>
<button onclick="showPanel('scripts')">Scripts</button>
<button onclick="showPanel('settings')">Settings</button>
</div>

<!-- AI PANEL -->

<div class="panel active" id="ai">

<div class="chat" id="chat"></div>

<input id="aiInput" placeholder="Ask AI...">

<button onclick="askAI()">Send</button>

</div>

<!-- NOTES -->

<div class="panel" id="notes">

<h3>Notes</h3>

<textarea id="notesBox" rows="10"></textarea>

<button onclick="saveNotes()">Save</button>

</div>

<!-- SCRIPT RUNNER -->

<div class="panel" id="scripts">

<h3>Script Runner</h3>

<textarea id="code" rows="10">console.log("hello world")</textarea>

<button onclick="runCode()">Run</button>

<div id="output"></div>

</div>

<!-- SETTINGS -->

<div class="panel" id="settings">

<h3>Settings</h3>

<div class="setting">
<label>AI typing animation</label>
<input type="checkbox" id="typingToggle" checked>
</div>

<div class="setting">
<label>Save chat history</label>
<input type="checkbox" id="chatSave" checked>
</div>

<div class="setting">
<label>Clear chat</label>
<button onclick="clearChat()">Clear</button>
</div>

</div>

</div>

<script>

/* panels */

function showPanel(id){

document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"))
document.getElementById(id).classList.add("active")

}

/* theme */

function toggleTheme(){

document.body.classList.toggle("light")

}

/* notes */

function saveNotes(){

localStorage.setItem("notes",document.getElementById("notesBox").value)

}

document.getElementById("notesBox").value=
localStorage.getItem("notes")||""

/* script runner */

function runCode(){

try{

let code=document.getElementById("code").value
let result=eval(code)
document.getElementById("output").innerText=result

}catch(e){

document.getElementById("output").innerText=e

}

}

/* chat */

function addMessage(text,type){

let msg=document.createElement("div")
msg.className="msg "+type
msg.innerText=text

document.getElementById("chat").appendChild(msg)

}

/* AI */

async function askAI(){

let input=document.getElementById("aiInput").value

if(!input) return

addMessage(input,"user")

document.getElementById("aiInput").value=""

let res=await fetch("/ai",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
message:input
})

})

let data=await res.json()

addMessage(data.reply,"ai")

}

/* clear chat */

function clearChat(){

document.getElementById("chat").innerHTML=""

}

</script>

</body>
</html>
