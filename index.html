<!DOCTYPE html>
<html>
<head>
<title>AI Dashboard</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
}

.container{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:900px;
height:600px;
background:#111;
border-radius:20px;
padding:20px;
}

.hidden{
display:none;
}

.chat{
height:380px;
overflow:auto;
margin-bottom:10px;
}

.msg{
padding:8px;
margin:5px;
border-radius:10px;
max-width:70%;
}

.user{background:#0077ff}
.ai{background:#444}

input,textarea{
width:100%;
padding:10px;
border-radius:10px;
border:none;
margin:5px 0;
}

button{
padding:10px 15px;
border:none;
border-radius:10px;
background:#00aaff;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<!-- LOGIN -->

<div class="container" id="loginBox">

<h2>Login</h2>

<input id="loginUser" placeholder="Username">
<input id="loginPass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<h3>Sign Up</h3>

<input id="signUser" placeholder="Username">
<input id="signPass" type="password" placeholder="Password">

<button onclick="signup()">Create Account</button>

</div>


<!-- DASHBOARD -->

<div class="container hidden" id="app">

<h2>AI Dashboard</h2>

<div class="chat" id="chat"></div>

<input id="aiInput" placeholder="Ask AI">

<button onclick="send()">Send</button>

</div>


<script>

let username=""

/* signup */

async function signup(){

let u=document.getElementById("signUser").value
let p=document.getElementById("signPass").value

let res=await fetch("/signup",{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({username:u,password:p})

})

let data=await res.json()

if(data.error) alert(data.error)
else alert("Account created")

}

/* login */

async function login(){

let u=document.getElementById("loginUser").value
let p=document.getElementById("loginPass").value

let res=await fetch("/login",{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({username:u,password:p})

})

let data=await res.json()

if(data.error){

alert(data.error)

}else{

username=u

document.getElementById("loginBox").classList.add("hidden")
document.getElementById("app").classList.remove("hidden")

}

}

/* add message */

function addMessage(text,type){

let msg=document.createElement("div")

msg.className="msg "+type

msg.innerText=text

document.getElementById("chat").appendChild(msg)

}

/* send */

async function send(){

let text=document.getElementById("aiInput").value

addMessage(text,"user")

document.getElementById("aiInput").value=""

let res=await fetch("/ai",{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({
username:username,
message:text
})

})

let data=await res.json()

addMessage(data.reply,"ai")

}

</script>

</body>
</html>
