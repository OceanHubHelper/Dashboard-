<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Home Dashboard</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,Arial;
background:#1b1b1b;
color:#e6e6e6;
}

/* dashboard */

.app{
width:95%;
max-width:1000px;
height:92vh;
margin:auto;
margin-top:4vh;
background:#262626;
border-radius:20px;
display:flex;
flex-direction:column;
padding:20px;
box-shadow:0 0 40px rgba(0,0,0,0.5);
}

/* header */

.header{
display:flex;
justify-content:space-between;
align-items:center;
font-size:22px;
}

/* nav */

.nav{
display:flex;
gap:10px;
margin:10px 0;
flex-wrap:wrap;
}

/* buttons */

button{
padding:10px 16px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#444,#333);
color:white;
cursor:pointer;
transition:.25s;
}

button:hover{
transform:scale(1.05);
background:linear-gradient(135deg,#666,#444);
}

/* panels */

.panel{
flex:1;
display:none;
overflow:auto;
}

.panel.active{
display:block;
}

/* chat */

.chat{
height:300px;
overflow:auto;
background:#1c1c1c;
border-radius:12px;
padding:10px;
display:flex;
flex-direction:column;
}

.msg{
padding:10px;
margin:6px 0;
border-radius:12px;
max-width:75%;
}

.user{
background:#4b6cff;
margin-left:auto;
}

.ai{
background:#3a3a3a;
}

/* inputs */

input,textarea{
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:#333;
color:white;
margin-top:8px;
}

/* tools grid */

.tools{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:10px;
margin-bottom:10px;
}

</style>
</head>

<body>

<div class="app">

<div class="header">
Home Dashboard
</div>

<div class="nav">

<button onclick="showPanel('ai')">AI</button>
<button onclick="showPanel('notes')">Notes</button>
<button onclick="showPanel('runner')">Code</button>
<button onclick="showPanel('files')">Files</button>
<button onclick="showPanel('roblox')">Roblox</button>
<button onclick="showPanel('account')">Account</button>
<button onclick="showPanel('settings')">Settings</button>

</div>

<!-- AI -->

<div class="panel active" id="ai">

<div class="chat" id="chat"></div>

<input id="aiInput" placeholder="Ask AI...">

<button onclick="send()">Send</button>

</div>

<!-- NOTES -->

<div class="panel" id="notes">

<h3>Notes</h3>

<textarea id="notesBox"></textarea>

<button onclick="saveNotes()">Save</button>

</div>

<!-- CODE RUNNER -->

<div class="panel" id="runner">

<h3>Code Runner</h3>

<textarea id="code">print(2)</textarea>

<button onclick="runCode()">Run</button>

<div id="output"></div>

</div>

<!-- FILES -->

<div class="panel" id="files">

<h3>Upload Files</h3>

<input type="file">

</div>

<!-- ROBLOX TAB -->

<div class="panel" id="roblox">

<h2>Roblox Tools</h2>

<div class="tools">

<button onclick="rbTool('player')">Player Lookup</button>
<button onclick="rbTool('avatar')">Avatar Viewer</button>
<button onclick="rbTool('game')">Game Info</button>
<button onclick="rbTool('servers')">Server Finder</button>
<button onclick="rbTool('badges')">Badge Viewer</button>
<button onclick="rbTool('scripts')">Script Builder</button>

</div>

<div id="rbPanel"></div>

</div>

<!-- ACCOUNT -->

<div class="panel" id="account">

<h3>Login</h3>

<input id="loginUser" placeholder="Username">
<input id="loginPass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<h3>Create Account</h3>

<input id="signUser" placeholder="Username">
<input id="signPass" type="password" placeholder="Password">

<button onclick="signup()">Sign Up</button>

</div>

<!-- SETTINGS -->

<div class="panel" id="settings">

<h3>Settings</h3>

<button onclick="toggleTheme()">Toggle Theme</button>
<button onclick="clearChat()">Clear Chat</button>

</div>

</div>

<script>

let username=""

/* panel switch */

function showPanel(id){
document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"))
document.getElementById(id).classList.add("active")
}

/* chat */

function addMessage(text,type){

let msg=document.createElement("div")

msg.className="msg "+type

msg.innerText=text

chat.appendChild(msg)

chat.scrollTop=chat.scrollHeight

}

async function send(){

let text=aiInput.value

if(!text) return

addMessage(text,"user")

aiInput.value=""

let res=await fetch("/ai",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
username:username,
message:text
})

})

let data=await res.json()

addMessage(data.reply,"ai")

}

/* notes */

notesBox.value=localStorage.getItem("notes")||""

function saveNotes(){
localStorage.setItem("notes",notesBox.value)
}

/* code runner */

function runCode(){

let code=document.getElementById("code").value

let match=code.match(/print\((.*?)\)/)

if(match){

output.innerText=match[1]

}else{

try{output.innerText=eval(code)}
catch(e){output.innerText=e}

}

}

/* roblox tools */

function rbTool(tool){

let panel=document.getElementById("rbPanel")

if(tool==="player"){

panel.innerHTML=`

<h3>Player Lookup</h3>
<input id="rbUser" placeholder="Username">
<button onclick="lookupPlayer()">Search</button>
<div id="rbResult"></div>

`

}

if(tool==="avatar"){

panel.innerHTML=`

<h3>Avatar Viewer</h3>
<input id="rbAvatar" placeholder="Username">
<button onclick="viewAvatar()">View</button>
<div id="rbAvatarResult"></div>

`

}

if(tool==="game"){

panel.innerHTML=`

<h3>Game Info</h3>
<input id="rbGame" placeholder="Game ID">
<button onclick="gameInfo()">Search</button>
<div id="rbGameResult"></div>

`

}

if(tool==="servers"){

panel.innerHTML=`

<h3>Server Finder</h3>
<input id="rbServerGame" placeholder="Game ID">
<button onclick="serverFind()">Find Servers</button>
<div id="rbServerResult"></div>

`

}

if(tool==="badges"){

panel.innerHTML=`

<h3>Badge Viewer</h3>
<input id="rbBadgeGame" placeholder="Game ID">
<button onclick="badgeSearch()">Search</button>
<div id="rbBadgeResult"></div>

`

}

if(tool==="scripts"){

panel.innerHTML=`

<h3>Script Builder</h3>
<textarea placeholder="Write your Roblox Lua script"></textarea>
<button>Save</button>
<button>Copy</button>

`

}

}

/* theme */

function toggleTheme(){
document.body.classList.toggle("light")
}

/* clear chat */

function clearChat(){
chat.innerHTML=""
}

</script>

</body>
</html>
