<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Future Dashboard</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f2027,#000000);
color:white;
overflow:hidden;
}

/* center elements */

.center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

/* title animation */

.title{
font-size:48px;
background:linear-gradient(90deg,#00f7ff,#00ffb3,#00f7ff);
background-size:200%;
-webkit-background-clip:text;
color:transparent;
animation:glow 5s linear infinite;
}

@keyframes glow{
0%{background-position:0%}
100%{background-position:200%}
}

/* inputs */

input{
padding:12px;
margin:10px;
border:none;
border-radius:10px;
width:230px;
}

/* buttons */

button{
padding:12px 30px;
margin:10px;
border:none;
border-radius:12px;
background:linear-gradient(45deg,#00c6ff,#0072ff);
color:white;
font-size:16px;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.1);
box-shadow:0 0 20px #00c6ff;
}

/* dashboard */

#dashboard{
display:none;
}

/* panels */

.panel{
display:none;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:75%;
height:75%;
background:rgba(0,0,0,.85);
border-radius:20px;
padding:20px;
box-shadow:0 0 40px cyan;
overflow:auto;
}

textarea{
width:100%;
height:200px;
background:#111;
color:#00ffff;
border:none;
padding:10px;
border-radius:10px;
}

.output{
margin-top:10px;
background:#000;
padding:10px;
color:#0f0;
border-radius:10px;
}

/* close button */

.close{
position:absolute;
right:20px;
top:15px;
font-size:22px;
cursor:pointer;
}

</style>
</head>

<body>

<!-- LOGIN -->

<div class="center" id="login">

<div class="title">LOGIN</div>

<input id="user" placeholder="Username"><br>
<input id="pass" type="password" placeholder="Password"><br>

<button onclick="login()">Enter</button>

</div>


<!-- DASHBOARD -->

<div id="dashboard" class="center">

<div class="title">FUTURE DASHBOARD</div>

<br>

<button onclick="openPanel('ai')">AI</button>
<button onclick="openPanel('notes')">Notes</button>
<button onclick="openPanel('scripts')">Script Runner</button>

</div>


<!-- AI PANEL -->

<div class="panel" id="ai">

<div class="close" onclick="closePanel('ai')">✕</div>

<h2>AI Assistant</h2>

<input id="aiInput" placeholder="Ask AI..." style="width:70%">

<button onclick="askAI()">Ask</button>

<div id="aiOutput"></div>

</div>


<!-- NOTES PANEL -->

<div class="panel" id="notes">

<div class="close" onclick="closePanel('notes')">✕</div>

<h2>Notes</h2>

<textarea id="notesBox"></textarea>

<br>

<button onclick="saveNotes()">Save Notes</button>

</div>


<!-- SCRIPT RUNNER -->

<div class="panel" id="scripts">

<div class="close" onclick="closePanel('scripts')">✕</div>

<h2>Script Runner</h2>

<textarea id="code">console.log("Hello world")</textarea>

<br>

<button onclick="runCode()">Run Code</button>

<div class="output" id="output"></div>

</div>


<script>

/* LOGIN */

const USERNAME="admin"
const PASSWORD="1234"

function login(){

let u=document.getElementById("user").value
let p=document.getElementById("pass").value

if(u===USERNAME && p===PASSWORD){

document.getElementById("login").style.display="none"
document.getElementById("dashboard").style.display="block"

}else{

alert("Wrong login")

}

}

/* PANEL OPEN/CLOSE */

function openPanel(id){
document.getElementById(id).style.display="block"
}

function closePanel(id){
document.getElementById(id).style.display="none"
}

/* NOTES */

function saveNotes(){

localStorage.setItem("notes",
document.getElementById("notesBox").value)

alert("Saved!")

}

document.getElementById("notesBox").value=
localStorage.getItem("notes")||""

/* SCRIPT RUNNER */

function runCode(){

let code=document.getElementById("code").value

try{

let result=eval(code)

document.getElementById("output").innerText=result

}catch(e){

document.getElementById("output").innerText=e

}

}

/* AI */

async function askAI(){

let input=document.getElementById("aiInput").value

document.getElementById("aiOutput").innerText="Thinking..."

try{

let res=await fetch("/ai",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
message:input
})

})

let data=await res.json()

document.getElementById("aiOutput").innerText=data.reply

}catch(e){

document.getElementById("aiOutput").innerText="AI failed"

}

}

</script>

</body>
</html>
