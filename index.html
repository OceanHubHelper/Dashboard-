<!DOCTYPE html>
<html>
<head>
<title>Home Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,Arial;
background:#1a1a1a;
color:#e5e5e5;
}

/* container */

.container{
width:95%;
max-width:1000px;
height:92vh;
margin:auto;
margin-top:4vh;
background:#222;
border-radius:20px;
display:flex;
flex-direction:column;
padding:20px;
box-sizing:border-box;
box-shadow:0 0 40px rgba(0,0,0,0.5);
}

/* header */

.header{
display:flex;
justify-content:space-between;
align-items:center;
font-size:22px;
margin-bottom:10px;
}

/* navigation */

.nav{
display:flex;
gap:10px;
margin-bottom:10px;
}

/* buttons */

button{

padding:10px 16px;
border:none;
border-radius:12px;

background:linear-gradient(135deg,#3a3a3a,#2a2a2a);
color:#e5e5e5;

cursor:pointer;

transition:0.25s;

box-shadow:0 3px 10px rgba(0,0,0,0.3);

}

button:hover{

transform:translateY(-2px) scale(1.05);

background:linear-gradient(135deg,#505050,#3a3a3a);

box-shadow:0 5px 20px rgba(0,0,0,0.5);

}

/* panels */

.panel{
flex:1;
display:none;
overflow:auto;
}

.panel.active{
display:block;
}

/* chat */

.chat{

height:380px;

overflow:auto;

padding:12px;

background:#1e1e1e;

border-radius:12px;

display:flex;
flex-direction:column;

}

/* message */

.msg{

padding:10px 14px;

margin:6px 0;

border-radius:14px;

max-width:75%;

line-height:1.4;

}

.user{
background:#3b5cff;
color:white;
margin-left:auto;
}

.ai{
background:#3a3a3a;
}

/* input */

.inputArea{

display:flex;

gap:10px;

margin-top:10px;

}

input,textarea{

width:100%;

padding:12px;

border:none;

border-radius:12px;

background:#2a2a2a;

color:white;

}

/* scroll button */

.scrollBtn{

position:absolute;

right:30px;

bottom:120px;

padding:8px 12px;

font-size:14px;

display:none;

}

/* login */

.loginBox{

width:90%;
max-width:400px;

position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);

background:#222;
padding:25px;
border-radius:20px;

}

.hidden{
display:none;
}

/* code runner */

.output{

background:#111;

padding:10px;

border-radius:10px;

margin-top:10px;

min-height:40px;

}

</style>
</head>

<body>

<!-- LOGIN -->

<div class="loginBox" id="loginBox">

<h2>Login</h2>

<input id="loginUser" placeholder="Username">
<input id="loginPass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<h3>Create Account</h3>

<input id="signUser" placeholder="Username">
<input id="signPass" type="password" placeholder="Password">

<button onclick="signup()">Sign Up</button>

</div>


<!-- DASHBOARD -->

<div class="container hidden" id="app">

<div class="header">

Home Dashboard

<button onclick="logout()">Logout</button>

</div>

<div class="nav">

<button onclick="showPanel('ai')">AI</button>
<button onclick="showPanel('notes')">Notes</button>
<button onclick="showPanel('runner')">Code Runner</button>

</div>

<!-- AI PANEL -->

<div class="panel active" id="ai">

<div class="chat" id="chat"></div>

<button class="scrollBtn" id="scrollBtn" onclick="scrollDown()">⬇ Latest</button>

<div class="inputArea">

<input id="aiInput" placeholder="Message AI...">

<button onclick="send()">Send</button>

</div>

</div>

<!-- NOTES -->

<div class="panel" id="notes">

<h3>Notes</h3>

<textarea id="notesBox" rows="12"></textarea>

<button onclick="saveNotes()">Save</button>

</div>

<!-- CODE RUNNER -->

<div class="panel" id="runner">

<h3>Code Runner</h3>

<textarea id="code" rows="10">print(2)</textarea>

<button onclick="runCode()">Run</button>

<div class="output" id="output"></div>

</div>

</div>


<script>

let username=""

/* panels */

function showPanel(id){

document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"))

document.getElementById(id).classList.add("active")

}

/* signup */

async function signup(){

let u=document.getElementById("signUser").value
let p=document.getElementById("signPass").value

let res=await fetch("/signup",{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({username:u,password:p})

})

let data=await res.json()

if(data.error) alert(data.error)
else alert("Account created")

}

/* login */

async function login(){

let u=document.getElementById("loginUser").value
let p=document.getElementById("loginPass").value

let res=await fetch("/login",{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({username:u,password:p})

})

let data=await res.json()

if(data.error){

alert(data.error)

}else{

username=u

document.getElementById("loginBox").classList.add("hidden")
document.getElementById("app").classList.remove("hidden")

}

}

/* logout */

function logout(){
location.reload()
}

/* add message */

function addMessage(text,type){

let msg=document.createElement("div")

msg.className="msg "+type
msg.innerText=text

document.getElementById("chat").appendChild(msg)

autoScroll()

}

/* auto scroll */

function autoScroll(){

let chat=document.getElementById("chat")

if(chat.scrollHeight-chat.scrollTop-chat.clientHeight<100){

chat.scrollTop=chat.scrollHeight

document.getElementById("scrollBtn").style.display="none"

}else{

document.getElementById("scrollBtn").style.display="block"

}

}

/* scroll button */

function scrollDown(){

let chat=document.getElementById("chat")

chat.scrollTop=chat.scrollHeight

document.getElementById("scrollBtn").style.display="none"

}

/* send */

async function send(){

let text=document.getElementById("aiInput").value

if(!text) return

addMessage(text,"user")

document.getElementById("aiInput").value=""

let res=await fetch("/ai",{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({
username:username,
message:text
})

})

let data=await res.json()

addMessage(data.reply,"ai")

}

/* notes */

function saveNotes(){

localStorage.setItem("notes",
document.getElementById("notesBox").value)

alert("Saved")

}

document.getElementById("notesBox").value=
localStorage.getItem("notes")||""

/* code runner */

function runCode(){

let code=document.getElementById("code").value

let output=""

try{

let match=code.match(/print\((.*?)\)/)

if(match){

output=match[1]

}else{

output=eval(code)

}

}catch(e){

output=e

}

document.getElementById("output").innerText=output

}

</script>

</body>
</html>
