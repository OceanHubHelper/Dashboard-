<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Home Dashboard</title>

<link rel="stylesheet" href="styles.css">

<style>

/* script editor layout */

.scriptLayout{
display:flex;
gap:20px;
height:400px;
}

.scriptEditor{
flex:1;
display:flex;
flex-direction:column;
}

.scriptAI{
width:40%;
background:#1c1c1c;
border-radius:14px;
padding:10px;
overflow:auto;
}

.codeArea{
flex:1;
}

.codeArea textarea{
height:100%;
}

.copyBtn{
margin-top:6px;
}

</style>

</head>

<body>

<div class="app">

<h2>Home Dashboard</h2>

<div class="nav">

<button onclick="showPanel('ai')">AI</button>
<button onclick="showPanel('notes')">Notes</button>
<button onclick="showPanel('runner')">Code</button>
<button onclick="showPanel('files')">Files</button>
<button onclick="showPanel('roblox')">Roblox</button>
<button onclick="showPanel('settings')">Settings</button>

</div>

<!-- AI CHAT -->

<div class="panel active" id="ai">

<div class="chat" id="chat"></div>

<input id="aiInput" placeholder="Ask AI">

<button onclick="send()">Send</button>

</div>

<!-- NOTES -->

<div class="panel" id="notes">

<h3>Notes</h3>

<textarea id="notesBox"></textarea>

<button onclick="saveNotes()">Save Notes</button>

</div>

<!-- SCRIPT BUILDER -->

<div class="panel" id="runner">

<h3>Script Builder</h3>

<div class="scriptLayout">

<div class="scriptEditor">

<div class="codeArea">

<textarea id="code">print("hello")</textarea>

</div>

<button onclick="runCode()">Run</button>

<button class="copyBtn" onclick="copyCode()">Copy Code</button>

<div id="output"></div>

</div>

<div class="scriptAI">

<h4>AI Script Helper</h4>

<div id="scriptChat"></div>

<input id="scriptInput" placeholder="Ask AI about script">

<button onclick="askScriptAI()">Ask AI</button>

</div>

</div>

</div>

<!-- FILES -->

<div class="panel" id="files">

<h3>Upload Files</h3>

<input type="file">

</div>

<!-- ROBLOX -->

<div class="panel" id="roblox">

<h3>Roblox Tools</h3>

<div class="tools">

<button onclick="rbPlayer()">Player Lookup</button>
<button onclick="rbAvatar()">Avatar Viewer</button
