<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Dashboard</title>

<link rel="stylesheet" href="/styles.css">

</head>

<body>

<canvas id="particles"></canvas>

<!-- SIDEBAR -->

<div class="sidebar">

<h2>AI Dashboard</h2>

<button onclick="showPanel('ai')">AI Chat</button>
<button onclick="showPanel('code')">Script Builder</button>
<button onclick="showPanel('roblox')">Roblox Tools</button>
<button onclick="showPanel('notes')">Notes</button>
<button onclick="showPanel('files')">Files</button>
<button onclick="showPanel('devtools')">Dev Tools</button>
<button onclick="showPanel('settings')">Settings</button>

</div>

<!-- MAIN -->

<div class="main">

<!-- AI CHAT -->

<div class="panel active" id="ai">

<div class="chat" id="chat"></div>

<div class="chatControls">

<input id="aiInput" placeholder="Ask AI">

<button onclick="send()">Send</button>
<button onclick="regenerate()">Regenerate</button>
<button onclick="clearChat()">Clear</button>

</div>

</div>

<!-- SCRIPT BUILDER -->

<div class="panel" id="code">

<h2>Script Builder</h2>

<div class="scriptLayout">

<div class="editor">

<textarea id="codeArea">print("hello")</textarea>

<div class="editorButtons">

<button onclick="runCode()">Run</button>
<button onclick="copyCode()">Copy</button>
<button onclick="formatCode()">Format</button>
<button onclick="explainCode()">Explain</button>

</div>

<div id="output"></div>

</div>

<div class="scriptAI">

<h3>AI Script Helper</h3>

<div id="scriptChat"></div>

<input id="scriptInput" placeholder="Ask AI about the script">

<button onclick="askScriptAI()">Ask AI</button>

</div>

</div>

<h3>Previous Code</h3>

<div id="history"></div>

<button onclick="toggleHistory()">View All</button>

</div>

<!-- ROBLOX -->

<div class="panel" id="roblox">

<h2>Roblox Tools</h2>

<div class="robloxButtons">

<button onclick="rbPlayer()">Player Lookup</button>
<button onclick="rbAvatar()">Avatar Viewer</button>
<button onclick="rbGame()">Game Search</button>
<button onclick="rbServers()">Server Finder</button>
<button onclick="rbBadges()">Badge Viewer</button>

</div>

<div id="rbPanel"></div>

</div>

<!-- NOTES -->

<div class="panel" id="notes">

<h2>Notes</h2>

<textarea id="notesBox"></textarea>

<div>

<button onclick="saveNotes()">Save</button>
<button onclick="exportNotes()">Export</button>
<button onclick="resetNotes()">Reset</button>

</div>

</div>

<!-- FILES -->

<div class="panel" id="files">

<h2>File Upload</h2>

<input type="file" id="fileInput">

<button onclick="uploadFile()">Upload</button>

<h3>Files</h3>

<div id="fileList"></div>

</div>

<!-- DEV TOOLS -->

<div class="panel" id="devtools">

<h2>Developer Tools</h2>

<h3>Console</h3>

<div id="console"></div>

<h3>API Tester</h3>

<input id="apiUrl" placeholder="API URL">

<button onclick="testAPI()">Send Request</button>

<pre id="apiResult"></pre>

</div>

<!-- SETTINGS -->

<div class="panel" id="settings">

<h2>Settings</h2>

<button onclick="toggleTheme()">Dark / Light</button>
<button onclick="toggleParticles()">Particles</button>
<button onclick="toggleAnimations()">Animations</button>
<button onclick="performanceMode()">Performance Mode</button>

<button onclick="logout()">Logout</button>

</div>

</div>

<script src="/dashboard.js"></script>
<script src="/ai.js"></script>
<script src="/roblox.js"></script>

</body>
</html>
