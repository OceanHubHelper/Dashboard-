<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Home Dashboard</title>

<style>

/* THEMES */

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,Arial;
background:#161616;
color:#e8e8e8;
overflow:hidden;
}

body.light{
background:#f4f4f4;
color:#111;
}

/* PARTICLE CANVAS */

#particles{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

/* APP CONTAINER */

.app{

width:95%;
max-width:950px;
height:92vh;

margin:auto;
margin-top:4vh;

background:rgba(30,30,30,0.9);

border-radius:20px;

padding:20px;

display:flex;
flex-direction:column;

box-shadow:0 0 40px rgba(0,0,0,0.5);

}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
font-size:22px;
}

/* NAVIGATION */

.nav{
display:flex;
gap:10px;
margin:10px 0;
}

/* BUTTONS */

button{

padding:10px 16px;

border:none;
border-radius:12px;

background:linear-gradient(135deg,#3a3a3a,#2b2b2b);

color:white;

cursor:pointer;

transition:.25s;

box-shadow:0 4px 15px rgba(0,0,0,.4);

}

button:hover{

transform:scale(1.05);

background:linear-gradient(135deg,#5a5a5a,#404040);

}

/* PANELS */

.panel{
flex:1;
display:none;
overflow:auto;
}

.panel.active{
display:block;
}

/* CHAT */

.chat{

height:360px;

overflow:auto;

padding:10px;

background:#1c1c1c;

border-radius:12px;

display:flex;
flex-direction:column;

}

/* MESSAGE */

.msg{

padding:10px;

margin:5px 0;

border-radius:14px;

max-width:75%;

}

.user{
background:#4a67ff;
margin-left:auto;
}

.ai{
background:#3b3b3b;
}

/* INPUT */

.inputArea{
display:flex;
gap:10px;
margin-top:10px;
}

input,textarea{

width:100%;

padding:12px;

border-radius:12px;

border:none;

background:#2c2c2c;

color:white;

}

/* SCROLL BUTTON */

.scrollBtn{

position:absolute;
bottom:120px;
right:40px;

display:none;

}

/* START PAGE */

.start{

position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);

background:#222;

padding:30px;

border-radius:20px;

width:320px;

text-align:center;

}

/* SETTINGS */

.setting{
margin-bottom:12px;
}

</style>
</head>

<body>

<canvas id="particles"></canvas>

<!-- START PAGE -->

<div class="start" id="startPage">

<h2>Home Dashboard</h2>

<button onclick="openLogin()">Login</button>
<br><br>
<button onclick="openSignup()">Sign Up</button>
<br><br>
<button onclick="openTerms()">Terms of Service</button>

</div>

<!-- LOGIN -->

<div class="start hidden" id="loginPage">

<h3>Login</h3>

<input id="loginUser" placeholder="Username">
<input id="loginPass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<br><br>

<button onclick="backStart()">Back</button>

</div>

<!-- SIGNUP -->

<div class="start hidden" id="signupPage">

<h3>Create Account</h3>

<input id="signUser" placeholder="Username">
<input id="signPass" type="password" placeholder="Password">

<button onclick="signup()">Create</button>

<br><br>

<button onclick="backStart()">Back</button>

</div>

<!-- TERMS -->

<div class="start hidden" id="termsPage">

<h3>Terms of Service</h3>

<p style="font-size:14px">

Use responsibly.  
Do not spam the AI.  
No illegal or harmful use.

</p>

<button onclick="backStart()">Back</button>

</div>

<!-- DASHBOARD -->

<div class="app hidden" id="app">

<div class="header">

Home Dashboard

<button onclick="logout()">Logout</button>

</div>

<div class="nav">

<button onclick="showPanel('ai')">AI</button>
<button onclick="showPanel('notes')">Notes</button>
<button onclick="showPanel('runner')">Code</button>
<button onclick="showPanel('files')">Files</button>
<button onclick="showPanel('settings')">Settings</button>

</div>

<!-- AI -->

<div class="panel active" id="ai">

<div class="chat" id="chat"></div>

<button class="scrollBtn" id="scrollBtn" onclick="scrollDown()">⬇ Latest</button>

<div class="inputArea">

<input id="aiInput" placeholder="Message AI...">

<button onclick="send()">Send</button>

</div>

</div>

<!-- NOTES -->

<div class="panel" id="notes">

<h3>Notes</h3>

<textarea id="notesBox" rows="12"></textarea>

<button onclick="saveNotes()">Save</button>

</div>

<!-- CODE RUNNER -->

<div class="panel" id="runner">

<h3>Code Runner</h3>

<textarea id="code">print(2)</textarea>

<button onclick="runCode()">Run</button>

<div id="output"></div>

</div>

<!-- FILES -->

<div class="panel" id="files">

<h3>Upload Files</h3>

<input type="file" id="fileInput">

<div id="fileList"></div>

</div>

<!-- SETTINGS -->

<div class="panel" id="settings">

<h3>Settings</h3>

<div class="setting">
<button onclick="toggleTheme()">Toggle Dark/Light Theme</button>
</div>

<div class="setting">
<button onclick="clearChat()">Clear Chat</button>
</div>

</div>

</div>

<script>

/* PAGE NAV */

function hideAll(){

["startPage","loginPage","signupPage","termsPage"].forEach(id=>{
document.getElementById(id).style.display="none"
})

}

function openLogin(){hideAll();loginPage.style.display="block"}
function openSignup(){hideAll();signupPage.style.display="block"}
function openTerms(){hideAll();termsPage.style.display="block"}
function backStart(){hideAll();startPage.style.display="block"}

/* PANEL NAV */

function showPanel(id){

document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"))

document.getElementById(id).classList.add("active")

}

/* LOGIN */

let username=""

async function login(){

let u=loginUser.value
let p=loginPass.value

let res=await fetch("/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username:u,password:p})
})

let data=await res.json()

if(data.error) alert(data.error)
else{

username=u

hideAll()

app.classList.remove("hidden")

}

}

async function signup(){

let u=signUser.value
let p=signPass.value

let res=await fetch("/signup",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username:u,password:p})
})

let data=await res.json()

if(data.error) alert(data.error)
else alert("Account created")

}

/* LOGOUT */

function logout(){
location.reload()
}

/* CHAT */

function addMessage(text,type){

let msg=document.createElement("div")

msg.className="msg "+type

msg.innerText=text

chat.appendChild(msg)

chat.scrollTop=chat.scrollHeight

}

async function send(){

let text=aiInput.value

if(!text) return

addMessage(text,"user")

aiInput.value=""

let res=await fetch("/ai",{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({
username:username,
message:text
})

})

let data=await res.json()

addMessage(data.reply,"ai")

}

/* NOTES */

notesBox.value=localStorage.getItem("notes")||""

function saveNotes(){

localStorage.setItem("notes",notesBox.value)

}

/* CODE RUNNER */

function runCode(){

let code=document.getElementById("code").value

let match=code.match(/print\((.*?)\)/)

if(match){

output.innerText=match[1]

}else{

try{output.innerText=eval(code)}
catch(e){output.innerText=e}

}

}

/* FILES */

fileInput.addEventListener("change",()=>{

let file=fileInput.files[0]

let item=document.createElement("div")

item.innerText=file.name

fileList.appendChild(item)

})

/* SETTINGS */

function toggleTheme(){

document.body.classList.toggle("light")

}

/* PARTICLES */

const canvas=document.getElementById("particles")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let particles=[]

for(let i=0;i<80;i++){

particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2+1,
dx:Math.random()-0.5,
dy:Math.random()-0.5
})

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

particles.forEach(p=>{

ctx.beginPath()
ctx.arc(p.x,p.y,p.r,0,Math.PI*2)
ctx.fillStyle="#555"
ctx.fill()

p.x+=p.dx
p.y+=p.dy

})

requestAnimationFrame(animate)

}

animate()

</script>

</body>
</html>
