<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Home Dashboard</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial;
background:#151515;
color:#e8e8e8;
overflow:hidden;
}

/* particle background */

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* container */

.app{

width:95%;
max-width:1100px;
height:92vh;

margin:auto;
margin-top:4vh;

background:rgba(32,32,32,0.9);

border-radius:22px;

display:flex;
flex-direction:column;

padding:20px;

box-shadow:0 0 60px rgba(0,0,0,0.6);

}

/* header */

.header{
font-size:24px;
font-weight:600;
margin-bottom:10px;
animation:fadeIn 1s ease;
}

/* navigation */

.nav{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:10px;
}

/* buttons */

button{

padding:10px 16px;

border:none;
border-radius:12px;

background:linear-gradient(135deg,#404040,#2e2e2e);

color:white;

cursor:pointer;

transition:.25s;

}

button:hover{

transform:scale(1.06);

background:linear-gradient(135deg,#6b6b6b,#4a4a4a);

}

/* panels */

.panel{
flex:1;
display:none;
overflow:auto;
animation:fadeIn .4s ease;
}

.panel.active{
display:block;
}

/* chat */

.chat{

height:340px;

overflow:auto;

background:#1e1e1e;

border-radius:14px;

padding:10px;

display:flex;
flex-direction:column;

}

/* messages */

.msg{

padding:10px 14px;

margin:6px 0;

border-radius:14px;

max-width:70%;

line-height:1.4;

animation:slideUp .25s ease;

}

.user{
background:#4d6bff;
margin-left:auto;
}

.ai{
background:#3a3a3a;
}

/* inputs */

input,textarea{

width:100%;

padding:12px;

border:none;

border-radius:12px;

background:#303030;

color:white;

margin-top:8px;

}

/* roblox tool grid */

.tools{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:10px;
margin-bottom:12px;
}

/* animations */

@keyframes fadeIn{
from{opacity:0;transform:translateY(10px)}
to{opacity:1;transform:translateY(0)}
}

@keyframes slideUp{
from{opacity:0;transform:translateY(15px)}
to{opacity:1;transform:translateY(0)}
}

</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="app">

<div class="header">Home Dashboard</div>

<div class="nav">

<button onclick="showPanel('ai')">AI</button>
<button onclick="showPanel('notes')">Notes</button>
<button onclick="showPanel('runner')">Code</button>
<button onclick="showPanel('roblox')">Roblox</button>
<button onclick="showPanel('settings')">Settings</button>

</div>

<!-- AI -->

<div class="panel active" id="ai">

<div class="chat" id="chat"></div>

<input id="aiInput" placeholder="Ask AI...">

<button onclick="send()">Send</button>

</div>

<!-- NOTES -->

<div class="panel" id="notes">

<h3>Notes</h3>

<textarea id="notesBox"></textarea>

<button onclick="saveNotes()">Save Notes</button>

</div>

<!-- CODE -->

<div class="panel" id="runner">

<h3>Code Runner</h3>

<textarea id="code">print(2)</textarea>

<button onclick="runCode()">Run</button>

<div id="output"></div>

</div>

<!-- ROBLOX -->

<div class="panel" id="roblox">

<h2>Roblox Tools</h2>

<div class="tools">

<button onclick="rbTool('player')">Player Lookup</button>
<button onclick="rbTool('avatar')">Avatar Viewer</button>
<button onclick="rbTool('game')">Game Info</button>
<button onclick="rbTool('servers')">Server Finder</button>
<button onclick="rbTool('badges')">Badge Viewer</button>

</div>

<div id="rbPanel"></div>

</div>

<!-- SETTINGS -->

<div class="panel" id="settings">

<h3>Settings</h3>

<button onclick="toggleTheme()">Toggle Theme</button>

</div>

</div>

<script>

/* panel switching */

function showPanel(id){

document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"))

document.getElementById(id).classList.add("active")

}

/* chat */

function addMessage(text,type){

let msg=document.createElement("div")

msg.className="msg "+type

msg.innerText=text

chat.appendChild(msg)

chat.scrollTop=chat.scrollHeight

}

async function send(){

let text=aiInput.value

if(!text) return

addMessage(text,"user")

aiInput.value=""

let res=await fetch("/ai",{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({
message:text
})

})

let data=await res.json()

addMessage(data.reply,"ai")

}

/* notes */

notesBox.value=localStorage.getItem("notes")||""

function saveNotes(){

localStorage.setItem("notes",notesBox.value)

}

/* code runner */

function runCode(){

let code=document.getElementById("code").value

let match=code.match(/print\((.*?)\)/)

if(match){

output.innerText=match[1]

}else{

try{output.innerText=eval(code)}
catch(e){output.innerText=e}

}

}

/* ROBLOX TOOLS */

function rbTool(tool){

let panel=document.getElementById("rbPanel")

if(tool==="player"){

panel.innerHTML=`
<h3>Player Lookup</h3>
<input id="rbUser" placeholder="Username">
<button onclick="lookupPlayer()">Search</button>
<div id="rbResult"></div>
`

}

if(tool==="avatar"){

panel.innerHTML=`
<h3>Avatar Viewer</h3>
<input id="rbAvatarUser" placeholder="Username">
<button onclick="viewAvatar()">View</button>
<div id="rbAvatarResult"></div>
`

}

}

/* Roblox API calls */

async function lookupPlayer(){

let user=document.getElementById("rbUser").value

let res=await fetch(
"https://api.allorigins.win/raw?url=https://users.roblox.com/v1/usernames/users",
{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({usernames:[user]})
})

let data=await res.json()

let id=data.data[0].id

document.getElementById("rbResult").innerText="User ID: "+id

}

async function viewAvatar(){

let user=document.getElementById("rbAvatarUser").value

let res=await fetch(
"https://api.allorigins.win/raw?url=https://users.roblox.com/v1/usernames/users",
{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({usernames:[user]})
})

let data=await res.json()

let id=data.data[0].id

let avatar=`https://thumbnails.roblox.com/v1/users/avatar?userIds=${id}&size=420x420&format=Png`

document.getElementById("rbAvatarResult").innerHTML=
`<img src="${avatar}" width="200">`

}

/* theme */

function toggleTheme(){

document.body.classList.toggle("light")

}

/* particles */

const canvas=document.getElementById("particles")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let particles=[]

for(let i=0;i<80;i++){

particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2+1,
dx:Math.random()-0.5,
dy:Math.random()-0.5
})

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

particles.forEach(p=>{

ctx.beginPath()
ctx.arc(p.x,p.y,p.r,0,Math.PI*2)
ctx.fillStyle="#555"
ctx.fill()

p.x+=p.dx
p.y+=p.dy

})

requestAnimationFrame(animate)

}

animate()

</script>

</body>
</html>
