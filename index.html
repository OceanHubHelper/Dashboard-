<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Future Dashboard</title>

<style>

body{
margin:0;
font-family:Arial;
background:radial-gradient(circle,#0f2027,#000);
color:white;
overflow:hidden;
}

/* center containers */

.center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

/* title animation */

.title{
font-size:50px;
background:linear-gradient(90deg,#00f7ff,#00ffb3,#00f7ff);
background-size:200%;
-webkit-background-clip:text;
color:transparent;
animation:glow 4s linear infinite;
}

@keyframes glow{
0%{background-position:0%}
100%{background-position:200%}
}

/* inputs */

input{
padding:12px;
margin:10px;
border:none;
border-radius:10px;
width:220px;
}

/* buttons */

button{
padding:12px 30px;
border:none;
border-radius:10px;
background:linear-gradient(45deg,#00c6ff,#0072ff);
color:white;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.1);
box-shadow:0 0 20px #00c6ff;
}

/* dashboard */

#dashboard{
display:none;
}

/* panels */

.panel{
display:none;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:70%;
height:70%;
background:rgba(0,0,0,.8);
border-radius:20px;
padding:20px;
box-shadow:0 0 30px cyan;
overflow:auto;
}

textarea{
width:100%;
height:200px;
background:#111;
color:#00ffff;
border:none;
}

.output{
margin-top:10px;
background:#000;
padding:10px;
color:#0f0;
}

</style>
</head>

<body>

<!-- LOGIN -->

<div class="center" id="login">

<div class="title">LOGIN</div>

<input id="user" placeholder="Username"><br>
<input id="pass" type="password" placeholder="Password"><br>

<button onclick="login()">Enter</button>

</div>


<!-- DASHBOARD -->

<div id="dashboard" class="center">

<div class="title">FUTURE DASHBOARD</div>

<br>

<button onclick="openPanel('ai')">AI</button>
<button onclick="openPanel('notes')">Notes</button>
<button onclick="openPanel('scripts')">Script Runner</button>

</div>


<!-- AI PANEL -->

<div class="panel" id="ai">

<h2>AI Assistant</h2>

<input id="aiInput" placeholder="Ask AI..." style="width:70%">

<button onclick="askAI()">Ask</button>

<div id="aiOutput"></div>

</div>


<!-- NOTES -->

<div class="panel" id="notes">

<h2>Notes</h2>

<textarea id="notesBox"></textarea>

<button onclick="saveNotes()">Save</button>

</div>


<!-- SCRIPT RUNNER -->

<div class="panel" id="scripts">

<h2>Script Runner</h2>

<textarea id="code">console.log("Hello world")</textarea>

<button onclick="runCode()">Run</button>

<div id="output"></div>

</div>


<script>

/* login system */

const USERNAME="admin"
const PASSWORD="1234"

function login(){

let u=document.getElementById("user").value
let p=document.getElementById("pass").value

if(u===USERNAME && p===PASSWORD){

document.getElementById("login").style.display="none"
document.getElementById("dashboard").style.display="block"

}else{

alert("Wrong login")

}

}

/* open panel */

function openPanel(id){

document.getElementById(id).style.display="block"

}

/* notes */

function saveNotes(){

localStorage.setItem("notes",
document.getElementById("notesBox").value)

}

document.getElementById("notesBox").value=
localStorage.getItem("notes")||""


/* script runner */

function runCode(){

let code=document.getElementById("code").value

try{

let result=eval(code)

document.getElementById("output").innerText=result

}catch(e){

document.getElementById("output").innerText=e

}

}


/* REAL AI */

async function askAI(){

let input=document.getElementById("aiInput").value

document.getElementById("aiOutput").innerText="Thinking..."

let res=await fetch("/ai",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:input})
})

let data=await res.json()

document.getElementById("aiOutput").innerText=data.reply

}

</script>

</body>
</html>
