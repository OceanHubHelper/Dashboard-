<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Dashboard</title>

<style>

body{
margin:0;
font-family:Arial;
background:#151515;
color:white;
display:flex;
}

/* sidebar */

.sidebar{
width:220px;
background:#1e1e1e;
padding:15px;
height:100vh;
}

.sidebar button{
width:100%;
margin-top:8px;
padding:10px;
border:none;
border-radius:8px;
background:#2c2c2c;
color:white;
cursor:pointer;
}

/* main */

.main{
flex:1;
padding:20px;
overflow:auto;
height:100vh;
}

.panel{display:none}
.panel.active{display:block}

/* chat */

.chat{
background:#202020;
padding:10px;
height:320px;
overflow:auto;
border-radius:10px;
}

.msgUser{
background:#3f6cff;
padding:8px;
border-radius:8px;
margin:6px 0;
}

.msgAI{
background:#2a2a2a;
padding:8px;
border-radius:8px;
margin:6px 0;
}

/* inputs */

textarea{
width:100%;
height:200px;
background:#202020;
color:white;
border:none;
padding:10px;
border-radius:10px;
}

input{
padding:8px;
border-radius:6px;
border:none;
}

/* buttons */

button{
margin-top:6px;
padding:8px 12px;
border:none;
border-radius:6px;
background:#3b3b3b;
color:white;
cursor:pointer;
}

/* history */

.history{
background:#1f1f1f;
padding:10px;
border-radius:10px;
max-height:140px;
overflow:auto;
}

.historyItem{
margin-bottom:6px;
cursor:pointer;
}

/* particles */

#particles{
position:fixed;
top:0;
left:0;
z-index:-1;
}

</style>

</head>

<body>

<canvas id="particles"></canvas>

<!-- SIDEBAR -->

<div class="sidebar">

<h2>AI Dashboard</h2>

<button onclick="showPanel('ai')">AI Chat</button>
<button onclick="showPanel('code')">Script Builder</button>
<button onclick="showPanel('roblox')">Roblox Tools</button>
<button onclick="showPanel('notes')">Notes</button>
<button onclick="showPanel('files')">Files</button>
<button onclick="showPanel('devtools')">Dev Tools</button>
<button onclick="showPanel('settings')">Settings</button>

</div>

<div class="main">

<!-- AI CHAT -->

<div class="panel active" id="ai">

<h2>AI Chat</h2>

<div class="chat" id="chat"></div>

<input id="aiInput" placeholder="Ask AI">
<button onclick="send()">Send</button>
<button onclick="clearChat()">Clear</button>

</div>

<!-- SCRIPT BUILDER -->

<div class="panel" id="code">

<h2>Script Builder</h2>

<textarea id="codeArea">print("hello")</textarea>

<button onclick="runCode()">Run</button>
<button onclick="copyCode()">Copy</button>

<h3>AI Script Helper</h3>

<div class="chat" id="scriptChat"></div>

<input id="scriptInput" placeholder="Ask AI about the script">
<button onclick="askScriptAI()">Ask AI</button>

<h3>Code History</h3>

<div id="history" class="history"></div>

</div>

<!-- ROBLOX -->

<div class="panel" id="roblox">

<h2>Roblox Tools</h2>

<button onclick="rbPlayer()">Player Lookup</button>
<button onclick="rbAvatar()">Avatar Viewer</button>
<button onclick="rbGame()">Game Search</button>
<button onclick="rbServers()">Server Finder</button>
<button onclick="rbBadges()">Badge Viewer</button>

<div id="rbPanel"></div>

</div>

<!-- NOTES -->

<div class="panel" id="notes">

<h2>Notes</h2>

<textarea id="notesBox"></textarea>

<button onclick="saveNotes()">Save</button>
<button onclick="exportNotes()">Export</button>

</div>

<!-- FILES -->

<div class="panel" id="files">

<h2>Files</h2>

<input type="file" id="fileInput">

<div id="fileList"></div>

</div>

<!-- DEVTOOLS -->

<div class="panel" id="devtools">

<h2>API Tester</h2>

<input id="apiUrl" placeholder="URL">
<button onclick="testAPI()">Send</button>

<pre id="apiResult"></pre>

</div>

<!-- SETTINGS -->

<div class="panel" id="settings">

<h2>Settings</h2>

<button onclick="toggleTheme()">Dark / Light</button>

</div>

</div>

<script>

/* tab switching */

function showPanel(id){
document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"))
document.getElementById(id).classList.add("active")
}

/* AI CHAT */

async function send(){

let text = aiInput.value
if(!text) return

let msg=document.createElement("div")
msg.className="msgUser"
msg.innerText=text
chat.appendChild(msg)

aiInput.value=""

/* loading */

let loading=document.createElement("div")
loading.className="msgAI"
loading.innerText="Thinking..."
chat.appendChild(loading)

chat.scrollTop=chat.scrollHeight

try{

let res=await fetch("/ai",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
username:"user",
message:text
})
})

let data=await res.json()

loading.remove()

typeAI(data.reply || "AI failed",chat)

}catch(e){

loading.innerText="AI error"

}

}

/* typing animation */

function typeAI(text,container){

let div=document.createElement("div")
div.className="msgAI"
container.appendChild(div)

let i=0

let interval=setInterval(()=>{

div.innerText+=text[i]
i++

container.scrollTop=container.scrollHeight

if(i>=text.length) clearInterval(interval)

},15)

}

/* clear chat */

function clearChat(){
chat.innerHTML=""
}

/* script runner */

function runCode(){

let code=codeArea.value

try{
let result=eval(code)
alert(result)
}catch(e){
alert(e)
}

saveHistory(code)

}

/* copy code */

function copyCode(){
navigator.clipboard.writeText(codeArea.value)
}

/* save history */

function saveHistory(code){

let item=document.createElement("div")

item.className="historyItem"

let date=new Date().toLocaleString()

item.innerText=date+" (click to load)"

item.onclick=()=>codeArea.value=code

history.prepend(item)

}

/* script AI */

async function askScriptAI(){

let code=codeArea.value
let question=scriptInput.value

typeAI("Analyzing script...",scriptChat)

let res=await fetch("/ai",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
username:"script",
message:"Analyze this code:\n"+code+"\nQuestion:"+question
})
})

let data=await res.json()

typeAI(data.reply,scriptChat)

}

/* roblox placeholders */

function rbPlayer(){rbPanel.innerText="Player lookup tool"}
function rbAvatar(){rbPanel.innerText="Avatar viewer"}
function rbGame(){rbPanel.innerText="Game search"}
function rbServers(){rbPanel.innerText="Server finder"}
function rbBadges(){rbPanel.innerText="Badge viewer"}

/* notes */

function saveNotes(){
localStorage.notes=notesBox.value
}

function exportNotes(){

let blob=new Blob([notesBox.value])
let a=document.createElement("a")
a.href=URL.createObjectURL(blob)
a.download="notes.txt"
a.click()

}

/* api tester */

async function testAPI(){

let res=await fetch(apiUrl.value)
let data=await res.text()

apiResult.innerText=data

}

/* theme */

function toggleTheme(){

document.body.style.background=
document.body.style.background=="white"?"#151515":"white"

}

/* particles */

const canvas=document.getElementById("particles")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let parts=[]

for(let i=0;i<80;i++){
parts.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
dx:Math.random()-0.5,
dy:Math.random()-0.5
})
}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

parts.forEach(p=>{
ctx.beginPath()
ctx.arc(p.x,p.y,2,0,6.28)
ctx.fillStyle="#555"
ctx.fill()

p.x+=p.dx
p.y+=p.dy
})

requestAnimationFrame(draw)

}

draw()

</script>

</body>
</html>
