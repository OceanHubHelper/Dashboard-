<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Home Dashboard</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,Arial;
background:#161616;
color:white;
}

.app{
width:95%;
max-width:1000px;
height:92vh;
margin:auto;
margin-top:4vh;
background:#242424;
border-radius:20px;
padding:20px;
display:flex;
flex-direction:column;
}

.nav{
display:flex;
gap:10px;
margin-bottom:10px;
flex-wrap:wrap;
}

button{
padding:10px 16px;
border:none;
border-radius:12px;
background:#3a3a3a;
color:white;
cursor:pointer;
}

button:hover{
background:#555;
}

.panel{
flex:1;
display:none;
overflow:auto;
}

.panel.active{
display:block;
}

.chat{
height:300px;
overflow:auto;
background:#1b1b1b;
border-radius:12px;
padding:10px;
}

.msg{
padding:10px;
margin:6px 0;
border-radius:12px;
max-width:70%;
}

.user{
background:#4a66ff;
margin-left:auto;
}

.ai{
background:#333;
}

input,textarea{
width:100%;
padding:12px;
border-radius:12px;
border:none;
background:#2d2d2d;
color:white;
margin-top:8px;
}

</style>
</head>

<body>

<div class="app">

<h2>Home Dashboard</h2>

<div class="nav">

<button onclick="showPanel('ai')">AI</button>
<button onclick="showPanel('notes')">Notes</button>
<button onclick="showPanel('runner')">Code</button>
<button onclick="showPanel('roblox')">Roblox</button>

</div>

<!-- AI -->

<div class="panel active" id="ai">

<div class="chat" id="chat"></div>

<input id="aiInput" placeholder="Ask AI">

<button onclick="send()">Send</button>

</div>

<!-- NOTES -->

<div class="panel" id="notes">

<textarea id="notesBox"></textarea>
<button onclick="saveNotes()">Save</button>

</div>

<!-- CODE -->

<div class="panel" id="runner">

<textarea id="code">print(2)</textarea>

<button onclick="runCode()">Run</button>

<div id="output"></div>

</div>

<!-- ROBLOX -->

<div class="panel" id="roblox">

<h3>Roblox Tools</h3>

<button onclick="rbPlayer()">Player Lookup</button>
<button onclick="rbAvatar()">Avatar Viewer</button>
<button onclick="rbGame()">Game Info</button>
<button onclick="rbServers()">Server Finder</button>
<button onclick="rbBadges()">Badge Viewer</button>

<div id="rbPanel"></div>

</div>

</div>

<script>

function showPanel(id){

document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"))

document.getElementById(id).classList.add("active")

}

/* AI */

function addMessage(text,type){

let msg=document.createElement("div")

msg.className="msg "+type

msg.innerText=text

chat.appendChild(msg)

chat.scrollTop=chat.scrollHeight

}

async function send(){

let text=aiInput.value

addMessage(text,"user")

aiInput.value=""

let res=await fetch("/ai",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:text})
})

let data=await res.json()

addMessage(data.reply,"ai")

}

/* NOTES */

notesBox.value=localStorage.getItem("notes")||""

function saveNotes(){

localStorage.setItem("notes",notesBox.value)

}

/* CODE RUNNER */

function runCode(){

let code=document.getElementById("code").value

let match=code.match(/print\((.*?)\)/)

if(match){

output.innerText=match[1]

}else{

try{output.innerText=eval(code)}
catch(e){output.innerText=e}

}

}

/* ROBLOX PLAYER */

function rbPlayer(){

rbPanel.innerHTML=`
<input id="rbUser" placeholder="Username">
<button onclick="lookupPlayer()">Search</button>
<div id="rbResult"></div>
`

}

async function lookupPlayer(){

let username=rbUser.value

let res=await fetch(
"https://users.roproxy.com/v1/usernames/users",
{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({usernames:[username]})
})

let data=await res.json()

if(!data.data.length){
rbResult.innerText="User not found"
return
}

let id=data.data[0].id

rbResult.innerText="User ID: "+id

}

/* AVATAR */

function rbAvatar(){

rbPanel.innerHTML=`
<input id="rbAvatarUser" placeholder="Username">
<button onclick="loadAvatar()">Load</button>
<div id="avatarResult"></div>
`

}

async function loadAvatar(){

let username=rbAvatarUser.value

let res=await fetch(
"https://users.roproxy.com/v1/usernames/users",
{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({usernames:[username]})
})

let data=await res.json()

let id=data.data[0].id

let img=`https://thumbnails.roproxy.com/v1/users/avatar?userIds=${id}&size=420x420&format=Png`

avatarResult.innerHTML=`<img src="${img}" width="200">`

}

/* GAME SEARCH */

function rbGame(){

rbPanel.innerHTML=`
<input id="gameName" placeholder="Game Name">
<button onclick="searchGame()">Search</button>
<div id="gameResult"></div>
`

}

async function searchGame(){

let name=gameName.value

let res=await fetch(
"https://games.roproxy.com/v1/games/list?model.keyword="+name+"&model.maxRows=10"
)

let data=await res.json()

if(!data.games.length){
gameResult.innerText="Game not found"
return
}

let game=data.games[0]

gameResult.innerHTML=`

<b>${game.name}</b><br>
Creator: ${game.creatorName}<br>
Players: ${game.playerCount}<br>
Visits: ${game.visits}

`

}

/* SERVERS */

function rbServers(){

rbPanel.innerHTML=`
<input id="serverGameId" placeholder="Game ID">
<button onclick="findServers()">Find</button>
<div id="serverResult"></div>
`

}

async function findServers(){

let id=serverGameId.value

let res=await fetch(
"https://games.roproxy.com/v1/games/"+id+"/servers/Public?limit=10"
)

let data=await res.json()

serverResult.innerHTML=data.data.map(s=>
`Players: ${s.playing}/${s.maxPlayers}`
).join("<br>")

}

/* BADGES */

function rbBadges(){

rbPanel.innerHTML=`
<input id="badgeGameId" placeholder="Game ID">
<button onclick="findBadges()">Search</button>
<div id="badgeResult"></div>
`

}

async function findBadges(){

let id=badgeGameId.value

let res=await fetch(
"https://badges.roproxy.com/v1/universes/"+id+"/badges?limit=10"
)

let data=await res.json()

badgeResult.innerHTML=data.data.map(b=>
b.name
).join("<br>")

}

</script>

</body>
</html>
